<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lab 1 - Reflected XSS</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <div class="brand-name">The Daily Write</div>
        <div class="brand-sub">Search across published posts</div>
      </div>
      <a class="badge" href="./index.html">Back to Home</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <h2>Blog Search</h2>
      <p class="meta">Find stories by title, topic, or keyword in our publishing archive.</p>
    </section>

    <div class="layout-2col">
      <section>
        <form method="get" action="./lab-reflected.html" class="card">
          <label>Search posts</label>
          <input name="q" placeholder="Try: remote work tips" />
          <button type="submit">Search</button>
        </form>

        <div class="card">
          <h3>Results</h3>
          <p id="results">No results yet.</p>
        </div>
      </section>

      <aside class="card">
        <h4>Trending Categories</h4>
        <ul class="sidebar-list">
          <li>Productivity</li>
          <li>Web development</li>
          <li>Career growth</li>
          <li>Creator economy</li>
        </ul>
      </aside>
    </div>

    <div id="success"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const q = params.get("q") || "";
    document.querySelector('input[name="q"]').value = q;
    document.getElementById("results").innerHTML = "No results found for: " + q;

    if (q.includes("xss-reflected-win")) {
      document.getElementById("success").innerHTML =
        '<div class="success">success_code: <code>XSS-REFLECTED-7A91</code></div>';
    }
  </script>
</body>
</html>
