<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lab 1 - Reflected XSS</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <div class="brand-name">Scaler Security Labs</div>
        <div class="brand-sub">Reflected XSS Lab</div>
      </div>
      <a class="badge" href="./index.html">Back to Home</a>
    </div>
  </header>

  <main>
    <h2>Lab 1: Reflected XSS</h2>
    <p>Search reflects <code>?q=</code> directly into the page.</p>
    <form method="get" action="./lab-reflected.html">
      <label>Search query</label>
      <input name="q" />
      <button type="submit">Search</button>
    </form>

    <div class="card">
      <h3>Search Results</h3>
      <p id="results">No results yet.</p>
    </div>
    <div id="success"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const q = params.get("q") || "";
    document.querySelector('input[name="q"]').value = q;
    document.getElementById("results").innerHTML = "No results found for: " + q;

    if (q.includes("xss-reflected-win")) {
      document.getElementById("success").innerHTML =
        '<div class="success">success_code: <code>XSS-REFLECTED-7A91</code></div>';
    }
  </script>
</body>
</html>
